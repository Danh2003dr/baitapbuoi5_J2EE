spring.application.name=baitapbuoi5_J2EE

# Cổng 8081 để tránh trùng với Apache (XAMPP) đang dùng 8080
server.port=8081

# Kết nối MySQL (XAMPP)
# Bật XAMPP MySQL và tạo database: CREATE DATABASE demoproduct;
# Nếu app tắt ngay khi chạy: kiểm tra MySQL đã chạy chưa, hoặc chạy với profile "dev" (H2, không cần MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/demoproduct
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialect cho MariaDB/MySQL (tránh lỗi khi không kết nối được DB)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Thư mục lưu ảnh upload (relative to working dir). Ảnh được serve tại /images/*
app.upload.dir=uploads
