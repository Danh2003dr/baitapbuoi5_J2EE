<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{_layout :: layout(~{::#main})}">
<head>
    <meta charset="UTF-8">
    <title>Thêm/Sửa danh mục</title>
</head>
<body>
    <div id="main">
        <div class="card-app">
            <div class="card-header" th:text="${category.id == 0} ? 'Thêm danh mục' : 'Sửa danh mục'">Thêm danh mục</div>
            <div class="card-body p-4">
                <form th:action="@{/categories/save}" th:object="${category}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-4">
                        <label for="name" class="form-label fw-semibold">Tên danh mục</label>
                        <input class="form-control form-control-lg" type="text" th:field="*{name}" id="name" placeholder="Ví dụ: Điện tử, Thời trang">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary-app">Lưu</button>
                        <a th:href="@{/categories}" class="btn btn-outline-app">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
