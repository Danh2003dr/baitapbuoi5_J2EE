<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QL Sản phẩm - Quản lý kho hàng</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
    </style>
    <!-- Bootstrap cho các trang form (add, category) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"/>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header / Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 md:px-10 py-3 sticky top-0 z-50">
    <div class="flex items-center gap-8">
        <a th:href="@{/}" class="flex items-center gap-4 text-primary no-underline">
            <div class="size-8 flex items-center justify-center bg-primary/10 rounded-lg">
                <span class="material-symbols-outlined text-primary text-2xl">inventory_2</span>
            </div>
            <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">QL Sản phẩm</h2>
        </a>
        <nav class="hidden md:flex items-center gap-9">
            <a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" th:href="@{/}">Trang chủ</a>
            <a class="text-primary text-sm font-bold border-b-2 border-primary pb-1" th:href="@{/products}">Sản phẩm</a>
            <a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" th:href="@{/categories}">Danh mục</a>
        </nav>
    </div>
    <div class="flex flex-1 justify-end gap-4 items-center">
        <label class="hidden sm:flex flex-col min-w-40 h-10 max-w-64">
            <div class="flex w-full flex-1 items-stretch rounded-lg h-full">
                <div class="text-slate-400 flex border-none bg-slate-100 dark:bg-slate-800 items-center justify-center pl-4 rounded-l-lg">
                    <span class="material-symbols-outlined">search</span>
                </div>
                <input class="flex w-full min-w-0 flex-1 border-none bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-0 h-full placeholder:text-slate-400 px-4 rounded-r-lg pl-2 text-sm font-normal" placeholder="Tìm kiếm sản phẩm..." type="text"/>
            </div>
        </label>
        <div class="flex items-center gap-2">
            <div class="bg-primary/10 aspect-square rounded-full size-9 border-2 border-primary/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary">person</span>
            </div>
            <span class="hidden lg:block text-sm font-semibold">Admin</span>
        </div>
    </div>
</header>

<main class="flex-1">
    <div class="max-w-[1280px] mx-auto px-4 md:px-10 pb-20" th:insert="${content}">
        <!-- Nội dung trang được chèn ở đây -->
    </div>
</main>

<!-- Footer -->
<footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-8">
    <div class="max-w-[1280px] mx-auto px-4 md:px-10 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-2 text-primary/60">
            <span class="material-symbols-outlined">terminal</span>
            <p class="text-sm font-medium text-slate-500 dark:text-slate-400">© 2025 — Phát triển ứng dụng với J2EE (Thymeleaf + JPA + MySQL)</p>
        </div>
        <div class="flex gap-6">
            <a class="text-slate-400 hover:text-primary transition-colors text-sm" href="#">Tài liệu</a>
            <a class="text-slate-400 hover:text-primary transition-colors text-sm" href="#">Hỗ trợ</a>
            <a class="text-slate-400 hover:text-primary transition-colors text-sm" href="#">Chính sách</a>
        </div>
    </div>
</footer>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
